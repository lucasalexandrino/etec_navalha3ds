<div id="login-panel" class="card-dark p-3 p-sm-4 p-md-5 text-center" style="display: block;">
  <div class="mb-3 mb-md-2">
    <img src="img/NavalhaVlogo.png" alt="Navalha Barbearia" class="img-fluid" style="max-height: 170px;">
    <p class="small mt-2">Acesse sua conta para continuar</p>
  </div>

  <form id="login-form">
    <div class="mb-3 text-start">
      <label class="form-label small">Email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="text" id="login-email" class="form-control" placeholder="Digite seu email">
      </div>
    </div>

    <div class="mb-4 text-start">
      <label class="form-label small">Senha</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" id="login-password" class="form-control" placeholder="Digite sua senha">
        <button class="btn btn-outline-secondary toggle-password" type="button" data-target="login-password"
          style="background: #1a1a1a; border-color: #2a2a2a; color: #fff;">
          <i class="bi bi-eye-slash"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-dark-custom w-100 py-2">Entrar</button>

    <div class="mt-3">
      <a href="#" id="show-register" class="text-secondary small">Não tem conta? Cadastre-se</a>
    </div>

    <!-- <div class="alert-custom mt-4 p-2 small">
      <i class="bi bi-info-circle"></i> <strong>Admin:</strong> admin@navalha.com / senha: NavalhaBarber26
    </div> -->
  </form>
</div>

<div id="register-panel" class="card-dark p-3 p-sm-4 p-md-5 text-center" style="display: none;">
  <div class="mb-3 mb-md-2">
    <img src="img/NavalhaVlogo.png" alt="Navalha Barbearia" class="img-fluid" style="max-height: 150px;">
    <p class="small mt-2">Cadastre-se para agendar seus serviços</p>
  </div>

  <form id="register-form">
    <div class="mb-3 text-start">
      <label class="form-label small">Nome completo *</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" id="reg-nome" class="form-control" placeholder="Seu nome completo">
      </div>
      <div class="invalid-feedback text-start" id="error-reg-nome"></div>
    </div>

    <div class="mb-3 text-start">
      <label class="form-label small">Email *</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" id="reg-email" class="form-control" placeholder="seu@email.com">
      </div>
      <div class="invalid-feedback text-start" id="error-reg-email"></div>
    </div>

    <div class="mb-3 text-start">
      <label class="form-label small">WhatsApp *</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-whatsapp"></i></span>
        <input type="tel" id="reg-whatsapp" class="form-control" placeholder="(00) 00000-0000">
      </div>
      <div class="invalid-feedback text-start" id="error-reg-whatsapp"></div>
    </div>

    <div class="mb-3 text-start">
      <label class="form-label small">Senha *</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" id="reg-password" class="form-control" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="invalid-feedback text-start" id="error-reg-password"></div>
    </div>

    <div class="mb-4 text-start">
      <label class="form-label small">Confirmar Senha *</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" id="reg-confirm-password" class="form-control" placeholder="Confirme sua senha">
      </div>
      <div class="invalid-feedback text-start" id="error-reg-confirm"></div>
    </div>

    <button type="submit" class="btn btn-dark-custom w-100 py-2">Cadastrar</button>

    <div class="mt-3">
      <a href="#" id="show-login" class="text-secondary small">Já tenho conta! Fazer login</a>
    </div>
  </form>
</div>
