<div class="card">
  <div class="card-header"><h5 class="mb-0"><i class="bi bi-percent me-2"></i>Configurações de Preços e Tempos</h5></div>
  <div class="card-body">
    <div class="row g-3">
      <div class="col-12"><label class="form-label fw-bold">Acréscimos</label></div>
      <div class="col-12 col-sm-6"><label class="form-label">Acréscimo domiciliar (%)</label><input type="number" id="perc-domicilio" class="form-control" step="1" min="0" max="100" value="30"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Tempo adicional domiciliar (min)</label><input type="number" id="tempo-domicilio" class="form-control" step="5" min="0" value="20"></div>
      <div class="col-12"><hr><label class="form-label fw-bold">Descontos e Tempos Adicionais</label></div>
      <div class="col-12 col-sm-6"><label class="form-label">Desconto Autista (%)</label><input type="number" id="perc-autista" class="form-control" step="1" min="0" max="100" value="10"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Tempo adicional Autista (min)</label><input type="number" id="tempo-autista" class="form-control" step="5" min="0" value="15"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Desconto Cadeirante (%)</label><input type="number" id="perc-cadeirante" class="form-control" step="1" min="0" max="100" value="15"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Tempo adicional Cadeirante (min)</label><input type="number" id="tempo-cadeirante" class="form-control" step="5" min="0" value="15"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Desconto Deficiência (%)</label><input type="number" id="perc-deficiente" class="form-control" step="1" min="0" max="100" value="10"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Tempo adicional Deficiência (min)</label><input type="number" id="tempo-deficiente" class="form-control" step="5" min="0" value="10"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Desconto Idoso (%)</label><input type="number" id="perc-idoso" class="form-control" step="1" min="0" max="100" value="20"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Tempo adicional Idoso (min)</label><input type="number" id="tempo-idoso" class="form-control" step="5" min="0" value="10"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Desconto Criança (%)</label><input type="number" id="perc-crianca" class="form-control" step="1" min="0" max="100" value="15"></div>
      <div class="col-12 col-sm-6"><label class="form-label">Tempo adicional Criança (min)</label><input type="number" id="tempo-crianca" class="form-control" step="5" min="0" value="15"></div>
      <div class="col-12"><button id="btn-salvar-configuracoes" class="btn btn-dark-custom w-100 mt-2">Salvar Configurações</button></div>
    </div>
  </div>
</div>
