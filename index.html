<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Navalha Barbearia</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/NavalhaFavlogo.png">
  <link rel="apple-touch-icon" href="img/NavalhaIcon.png">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <!-- CSS Customizado -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Tema Claro (carregado dinamicamente) -->
  <link id="light-theme-stylesheet" rel="stylesheet" href="css/light-theme.css" disabled>
</head>

<body>

  <!-- TELA DE LOGIN / CADASTRO (carregada via JS) -->
  <div id="auth-screen"></div>

  <!-- APP PRINCIPAL -->
  <div id="app" class="hidden">
    <!-- HEADER (carregado via JS) -->
    <div id="header-container"></div>

    <main class="container-fluid px-3 px-md-4 py-4">
      <!-- PAINEL CLIENTE (carregado via JS) -->
      <div id="painel-cliente-container"></div>

      <!-- PAINEL BARBEIRO (carregado via JS) -->
      <div id="painel-barbeiro-container" class="hidden"></div>
    </main>
  </div>

  <!-- MODAIS GLOBAIS -->
  <div id="modais-container"></div>

  <div id="toast-container" class="position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js" type="module"></script>
</body>

</html>
