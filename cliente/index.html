<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navalha — Área do cliente</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body>
  <header class="topo topo-cliente">
    <div class="topo-esq">
      <h1>Navalha — Cliente</h1>
      <p id="usuario-resumo" class="usuario-resumo"></p>
    </div>
    <nav class="topo-acoes" aria-label="Conta">
      <button type="button" id="btn-logout" class="btn-sec">Sair</button>
    </nav>
  </header>

  <main class="main-cliente" id="conteudo-principal">
    <h2 class="visually-hidden">Painel do cliente</h2>
    <div class="grid-cliente">
      <section class="card" aria-labelledby="titulo-calendario">
        <h2 id="titulo-calendario">Calendário</h2>
        <div class="cal-nav">
          <button type="button" id="cal-mes-ant" aria-label="Mês anterior">◀</button>
          <span id="cal-titulo-mes" aria-live="polite"></span>
          <button type="button" id="cal-prox-mes" aria-label="Próximo mês">▶</button>
        </div>
        <ul class="cal-semanas" aria-hidden="true">
          <li>Dom</li>
          <li>Seg</li>
          <li>Ter</li>
          <li>Qua</li>
          <li>Qui</li>
          <li>Sex</li>
          <li>Sáb</li>
        </ul>
        <div id="cal-grade" class="cal-grade" aria-label="Dias do mês"></div>
      </section>

      <section class="card" aria-labelledby="titulo-agendamento">
        <h2 id="titulo-agendamento">Novo agendamento</h2>
        <form id="form-agendamento" class="form" novalidate aria-labelledby="titulo-agendamento">
          <label>
            Nome
            <input type="text" id="ag-nome" name="nome" autocomplete="name" />
          </label>
          <label>
            WhatsApp
            <input type="tel" id="ag-whatsapp" name="whatsapp" inputmode="numeric" />
          </label>
          <label>
            Serviço
            <select id="ag-servico" name="servico"></select>
          </label>
          <label>
            Data
            <input type="date" id="ag-data" name="data" />
          </label>
          <label>
            Horário
            <input type="time" id="ag-hora" name="hora" />
          </label>
          <button type="submit" class="btn-prim">Confirmar agendamento</button>
        </form>
      </section>
    </div>
  </main>

  <script src="../lib/armazenamento.js"></script>
  <script src="app.js"></script>
</body>
</html>
